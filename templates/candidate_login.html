{% extends "base.html" %}
{% block content %}

<!-- HEADER BAR -->
<div style="
    background: linear-gradient(135deg, #6b21a8, #a855f7);
    padding: 15px;
    border-radius: 12px;
    color: lavenderblush;
    margin-bottom: 20px;
">
    <h2 style="margin:0; font-size: 28px;">Candidate Test Login</h2>
    <p style="margin:0; font-size: 14px;">Access your recruitment assessment</p>
</div>

<!-- CENTERED CARD -->
<div style="display:flex; justify-content:center; align-items:center;">

    <div style="
        width: 400px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        background: lavenderblush;
        text-align: center;
    ">

        <h3 style="margin-bottom: 20px;">Login with Email</h3>

        <form method="post">
            <input type="text" name="name" placeholder="Enter Name" required
                style="
                    width: 100%;
                    padding: 12px;
                    margin-bottom: 15px;
                    border-radius: 8px;
                    border: 1px solid #ccc;
                ">
            <input type="email" name="email" placeholder="Enter your email" required
                style="
                    width: 100%;
                    padding: 12px;
                    margin-bottom: 15px;
                    border-radius: 8px;
                    border: 1px solid #ccc;
                ">

            <button type="submit"
                style="
                    width: 100%;
                    padding: 12px;
                    border: none;
                    border-radius: 8px;
                    background: #7b2ff7;
                    color: white;
                    font-weight: bold;
                    cursor: pointer;
                ">
                Start Test
            </button>

        </form>

        <!-- EXTRA FEATURES -->
        <p style="margin-top:15px; font-size: 12px; color: gray;">
            Make sure you use your registered email.
        </p>

    </div>

</div>

{% endblock %}
