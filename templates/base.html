<!DOCTYPE html>
<html>
<head>
    <title>Faculty Career Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(135deg, #fce7f3, #e9d5ff);
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .page-wrapper {
            flex: 1;
            padding-bottom: 40px;
        }

        .portal-header {
            text-align: center;
            padding: 35px 0 10px 0;
            font-size: 30px;
            font-weight: 600;
            color: #6b21a8;
        }

        .top-links {
            position: absolute;
            right: 40px;
            top: 35px;
        }

        .top-links a {
            margin-left: 15px;
            text-decoration: none;
            color: #7c3aed;
            font-weight: 500;
        }

        .top-links a:hover {
            text-decoration: underline;
        }

        .card-custom {
            border-radius: 18px;
            border: none;
            background: lavenderblush;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.15);
        }

        .btn-primary {
            background: linear-gradient(to right, #d946ef, #a855f7);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .footer {
            background: #f3e8ff;
            text-align: center;
            padding: 18px;
            font-size: 14px;
            color: #7c3aed;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .header-box {
        background: #f3e8ff;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        padding: 18px 0;
        }

        .portal-title {
            font-size: 24px;
            font-weight: 600;
            color: #6b21a8;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #7c3aed;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
        
        .question-text{
            text-align:justify;
            line-height:1.6;
            font-size:16px;
        }
        
    </style>
</head> 
<body>

<div class="header-box">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="portal-title">
            Faculty Career Portal
        </div>

        <div class="nav-links">

        {% if session.get("admin_logged_in") %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/openings">Open Positions</a>
        {% endif %}
        </div>
    </div>
</div>

<div class="container page-wrapper mt-4 flex-grow-1">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    © 2026 AI-Driven Faculty Recruitment System
</div>

</body>
</html>
